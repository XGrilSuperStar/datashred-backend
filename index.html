<script>
    const HOST_API = "https://accurate-happiness-production-93e8.up.railway.app";
    let currentMode = "login";
    let globalCustomerId = localStorage.getItem("customerId") || null;

    function toggleAuthMode() {
        const isLogin = currentMode === "login";
        currentMode = isLogin ? "signup" : "login";
        document.getElementById("auth-title").innerText = isLogin ? "Create Security Account" : "Log In to System Core";
        document.getElementById("signup-fields").style.display = isLogin ? "block" : "none";
        document.getElementById("auth-toggle").innerText = isLogin ? "Already have an account? Log In" : "Create an account";
    }

    async function submitAuthForm() {
        const email = document.getElementById("auth-email").value;
        const password = document.getElementById("auth-pass").value;
        const endpoint = currentMode === "login" ? "/api/v1/auth/login" : "/api/v1/auth/register";

        const body = { email, password };
        if (currentMode === "signup") {
            body.first_name = document.getElementById("reg-first").value;
            body.last_name = document.getElementById("reg-last").value;
        }

        try {
            const res = await fetch(`${HOST_API}${endpoint}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
            const data = await res.json();

            if (!res.ok) {
                alert(data.detail ? JSON.stringify(data.detail) : "Something went wrong. Please try again.");
                return;
            }

            globalCustomerId = data.customer_id;
            localStorage.setItem("customerId", globalCustomerId);
            showMainApp();
        } catch (err) {
            alert("Could not reach the server. Please try again in a moment.");
        }
    }

    function showMainApp() {
        document.getElementById("auth-box").style.display = "none";
        document.getElementById("paywall-box").style.display = "block";
        document.getElementById("main-dashboard").style.display = "block";
        document.getElementById("account-status-text").innerText = `Connected — Customer #${globalCustomerId}`;
        loadDashboard();
    }

    async function loadDashboard() {
        if (!globalCustomerId) return;
        try {
            const res = await fetch(`${HOST_API}/api/v1/dashboard?customer_id=${globalCustomerId}`);
            const data = await res.json();
            renderTimeline(data);
        } catch (err) {
            console.error("Dashboard load failed", err);
        }
    }

    function renderTimeline(data) {
        const box = document.getElementById("timeline-box");
        const items = Array.isArray(data) ? data : (data.activity || data.items || []);

        if (!items || items.length === 0) {
            box.innerHTML = '<div class="timeline-desc">No activity yet. Click Shred Now to deploy agent.</div>';
            return;
        }

        box.innerHTML = items.map(item => `
            <div class="timeline-item">
                <div class="timeline-time">${item.time || item.timestamp || ""}</div>
                <div class="timeline-title">${item.title || item.broker || item.name || "Activity"}</div>
                <div class="timeline-desc">${item.description || item.status || ""}</div>
            </div>
        `).join("");
    }

    async function triggerManualReset() {
        if (!globalCustomerId) return;
        const btn = document.getElementById("reset-scan-btn");
        btn.disabled = true;
        btn.innerText = "Working...";

        try {
            const res = await fetch(`${HOST_API}/api/v1/dashboard/reset-scan`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ customer_id: globalCustomerId })
            });
            await res.json();
            await loadDashboard();
        } catch (err) {
            alert("Could not start the scan. Please try again.");
        } finally {
            btn.disabled = false;
            btn.innerText = "⚡ Shred Now";
        }
    }

    async function addTierAccess() {
        const customerId = document.getElementById("adm-user-id").value;
        const tier = document.getElementById("adm-tier").value;
        const secret = document.getElementById("adm-secret").value;

        try {
            const res = await fetch(`${HOST_API}/api/v1/admin/grant-access`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-Admin-Key": secret
                },
                body: JSON.stringify({ customer_id: Number(customerId), tier })
            });
            const data = await res.json();
            if (!res.ok) {
                alert(data.detail ? JSON.stringify(data.detail) : "Authorization failed.");
                return;
            }
            alert("Access granted successfully.");
        } catch (err) {
            alert("Could not reach the server.");
        }
    }

    // If the user already logged in before, skip straight to dashboard
    if (globalCustomerId) {
        showMainApp();
    }
</script>
